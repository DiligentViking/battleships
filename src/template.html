<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>battleships</title>
    <link rel="stylesheet" href="./styles/index.css" />
    <script type="module" src="./scripts/index.js"></script>
  </head>
  <body>
    <main class="app">
      <div class="top-area">
        <h2 class="message"></h2>
      </div>

      <div class="middle-area">
        <div class="board-wrapper p1">
          <div class="board p1"></div>
        </div>
        <div class="board-wrapper p2">
          <div class="board p2"></div>
        </div>

        <div class="fleet-wrapper">
          <div class="fleet-container hide"></div>
          <div class="buttons">
            <button class="reset">Reset</button>
            <button class="random">Random</button>
          </div>
        </div>
      </div>

      <div class="bottom-area">
        <button class="deploy hide">Deploy</button>
      </div>
    </main>
  </body>
</html>
