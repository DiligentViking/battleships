<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>battleships</title>
    <link rel="stylesheet" href="./styles/index.css" />
    <script type="module" src="./scripts/index.js"></script>
  </head>
  <body>
    <div class="main-menu" id="mainMenu">
      <div class="menu-bg" id="menuBg"></div>

      <h1 class="menu-title">Grid Ships</h1>

      <div class="menu-buttons">
        <button class="menu-btn" data-action="start">Start Game</button>
        <button class="menu-btn" data-action="ai">Versus AI</button>
        <button class="menu-btn" data-action="settings">Settings</button>
      </div>
    </div>

    <main class="app">
      <div class="top-area">
        <h2 class="message"></h2>
      </div>

      <div class="middle-area">
        <div class="board-wrapper p1">
          <div class="board p1"></div>
        </div>
        <div class="board-wrapper p2">
          <div class="board p2"></div>
        </div>

        <div class="fleet-wrapper">
          <div class="fleet-container hide"></div>
          <div class="buttons">
            <button class="reset">Reset</button>
            <button class="random">Random</button>
          </div>
        </div>
      </div>

      <div class="bottom-area">
        <button class="deploy hide">Deploy</button>
      </div>
    </main>

    <svg width="0" height="0" style="position: absolute">
      <defs>
        <linearGradient id="metal-p1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a2a3a" />
          <stop offset="50%" stop-color="#0a141e" />
          <stop offset="100%" stop-color="#050810" />
        </linearGradient>

        <linearGradient id="metal-p2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3a1a3a" />
          <stop offset="50%" stop-color="#1e0a1e" />
          <stop offset="100%" stop-color="#100510" />
        </linearGradient>
      </defs>
    </svg>
  </body>
</html>
